<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WealthWatch — Sign In</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
    <style>
      body { justify-content: center; align-items: center; }
      .login-card {
        background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
        padding: 48px 40px; width: 90%; max-width: 380px; text-align: center;
      }
      .login-logo { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 32px; }
      .login-title { font-family: var(--font-serif); font-size: 14px; color: var(--muted); margin-bottom: 24px; text-transform: uppercase; letter-spacing: 0.1em; }
      .pin-input {
        width: 100%; background: var(--surface2); border: 1px solid var(--border); color: var(--text);
        padding: 14px 18px; border-radius: 10px; font-family: var(--font-sans); font-size: 20px;
        text-align: center; letter-spacing: 12px; outline: none; transition: border-color 0.15s;
      }
      .pin-input:focus { border-color: var(--accent); }
      .pin-input::placeholder { letter-spacing: 4px; font-size: 14px; }
      .login-btn {
        width: 100%; margin-top: 20px; padding: 13px; border-radius: 10px; border: none;
        background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #0f1117;
        font-family: var(--font-sans); font-size: 14px; font-weight: 600; cursor: pointer;
        transition: filter 0.15s;
      }
      .login-btn:hover { filter: brightness(1.1); }
      .login-error {
        background: rgba(224,92,92,0.12); color: var(--red); padding: 10px 16px;
        border-radius: 8px; font-size: 13px; margin-top: 16px;
      }
      .login-footer { margin-top: 32px; font-size: 11px; color: var(--muted); }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-logo">
            <span class="logo-mark">W</span>
            <div class="logo-text">
                <span class="logo-name">WealthWatch</span>
                <span class="logo-sub">by PF9</span>
            </div>
        </div>
        <div class="login-title">Enter your PIN to continue</div>
        <form method="POST">
            <input type="hidden" name="_csrf" value="{{ csrf_token }}">
            <input type="password" name="pin" class="pin-input" placeholder="PIN" maxlength="10" autofocus inputmode="numeric">
            <button type="submit" class="login-btn">Unlock</button>
            {% if error %}
            <div class="login-error">{{ error }}</div>
            {% endif %}
        </form>
        <div class="login-footer">Plainspoken Foundry Nine LLC</div>
    </div>
</body>
</html>
